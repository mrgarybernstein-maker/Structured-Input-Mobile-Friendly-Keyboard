<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Engine v14</title>

<style>
body { font-family: Arial; padding: 20px; }

.field { margin-bottom: 25px; }

label {
  display: block;
  font-weight: bold;
  margin-bottom: 6px;
}

.row {
  display: flex;
  gap: 8px;
}

input {
  padding: 10px;
  font-size: 18px;
  border: 1px solid #ccc;
  border-radius: 6px;
  text-align: center;
}

.small { width: 60px; }
.medium { width: 80px; }
.large { width: 100px; }

.invalid {
  border-color: red;
  background: #ffd6d6;
}

button {
  margin-right: 10px;
  padding: 10px 15px;
}
</style>
</head>

<body>

<!-- DOB -->
<div class="field">
  <label>DOB (DD MMM YYYY)</label>
  <div class="row">
    <input id="dob-dd" class="small" inputmode="numeric" placeholder="31">
    <input id="dob-mm" class="medium" inputmode="text" placeholder="MAR">
    <input id="dob-yyyy" class="large" inputmode="numeric" placeholder="1980">
  </div>
</div>

<!-- Postal -->
<div class="field">
  <label>Postal Code (ANA NAN)</label>
  <div class="row">
    <input id="p1" class="small" inputmode="text" maxlength="1">
    <input id="p2" class="small" inputmode="numeric" maxlength="1">
    <input id="p3" class="small" inputmode="text" maxlength="1">
    <input id="p4" class="small" inputmode="numeric" maxlength="1">
    <input id="p5" class="small" inputmode="text" maxlength="1">
    <input id="p6" class="small" inputmode="numeric" maxlength="1">
  </div>
</div>

<!-- RAMQ -->
<div class="field">
  <label>RAMQ (AAAA NNNN NNNN)</label>
  <div class="row">
    <input id="r1" class="small" inputmode="text" maxlength="1">
    <input id="r2" class="small" inputmode="text" maxlength="1">
    <input id="r3" class="small" inputmode="text" maxlength="1">
    <input id="r4" class="small" inputmode="text" maxlength="1">

    <input id="r5" class="small" inputmode="numeric" maxlength="1">
    <input id="r6" class="small" inputmode="numeric" maxlength="1">
    <input id="r7" class="small" inputmode="numeric" maxlength="1">
    <input id="r8" class="small" inputmode="numeric" maxlength="1">

    <input id="r9" class="small" inputmode="numeric" maxlength="1">
    <input id="r10" class="small" inputmode="numeric" maxlength="1">
    <input id="r11" class="small" inputmode="numeric" maxlength="1">
    <input id="r12" class="small" inputmode="numeric" maxlength="1">
  </div>
</div>

<button id="submit">Submit</button>
<button id="clear">Clear</button>

<div id="report" style="margin-top:20px;font-weight:bold;"></div>

<script>
// ===== AUTO ADVANCE =====
function autoAdvance(inputs, isLetter) {
  inputs.forEach((input, i) => {
    input.addEventListener("input", () => {
      if (input.value.length > 0) {
        if (isLetter(input)) {
          input.value = input.value.replace(/[^A-Za-z]/g, "").toUpperCase();
        } else {
          input.value = input.value.replace(/\D/g, "");
        }
        if (i < inputs.length - 1) inputs[i + 1].focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && input.value === "" && i > 0) {
        inputs[i - 1].focus();
      }
    });
  });
}

// ===== SETUP =====
const postalInputs = [p1,p2,p3,p4,p5,p6];
autoAdvance(postalInputs, (inp)=> inp.inputMode==="text");

const ramqInputs = [r1,r2,r3,r4,r5,r6,r7,r8,r9,r10,r11,r12];
autoAdvance(ramqInputs, (inp)=> inp.inputMode==="text");

// ===== FORMAT DOB =====
dob_mm.addEventListener("input", () => {
  dob_mm.value = dob_mm.value.replace(/[^A-Za-z]/g,"").toUpperCase();
});
dob_dd.addEventListener("input", () => {
  dob_dd.value = dob_dd.value.replace(/\D/g,"");
});
dob_yyyy.addEventListener("input", () => {
  dob_yyyy.value = dob_yyyy.value.replace(/\D/g,"");
});

// ===== SUBMIT =====
submit.onclick = () => {
  const dob = dob_dd.value + "-" + dob_mm.value + "-" + dob_yyyy.value;
  const postal = postalInputs.map(i=>i.value).join("");
  const ramq = ramqInputs.map(i=>i.value).join("");

  report.innerText =
    "DOB: " + dob +
    "\nPostal: " + postal +
    "\nRAMQ: " + ramq;
};

// ===== CLEAR =====
clear.onclick = () => {
  document.querySelectorAll("input").forEach(i=>i.value="");
  report.innerText="";
};
</script>

</body>
</html>
