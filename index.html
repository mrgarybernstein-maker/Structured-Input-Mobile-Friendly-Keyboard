<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Input Engine v3</title>
<style>
body { font-family: Arial; padding: 20px; }
.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; display: block; }
input { 
  font-size: 18px; padding: 6px; width: 180px; 
  margin-right: 8px; border: 1px solid #ccc; border-radius: 4px;
}
input.invalid { border-color: red; background: #ffd6d6; }
.saved-values { margin-top: 6px; font-size: 13px; }
.saved-label { color: #666; margin-bottom: 3px; display: block; }
.saved-chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 3px 6px 0 0;
  background: #e0e7ff;
  border-radius: 12px;
  cursor: pointer;
}
button { margin-right: 10px; padding: 10px 15px; }
</style>
</head>
<body>

<div class="field">
  <label class="label" for="dob">Date of Birth</label>
  <input id="dob" type="text" autocomplete="bday" inputmode="numeric" placeholder="DD-MMM-YYYY" maxlength="11">
  <div id="dob-saved" class="saved-values"></div>
</div>

<div class="field">
  <label class="label" for="postal">Postal Code</label>
  <input id="postal" type="text" autocomplete="postal-code" inputmode="text" placeholder="H0H 0H0" maxlength="7">
  <div id="postal-saved" class="saved-values"></div>
</div>

<div class="field">
  <label class="label" for="ramq">RAMQ</label>
  <input id="ramq" type="text" autocomplete="off" inputmode="text" placeholder="AAAA 1234 1234" maxlength="13">
  <div id="ramq-saved" class="saved-values"></div>
</div>

<br>
<button id="submit-btn">Submit</button>
<button id="clear-btn">Clear</button>

<div id="report" style="margin-top:20px; font-weight:bold;"></div>

<script>
function initField(id, storageKey, formatFn, validatorFn) {
  const input = document.getElementById(id);
  const savedContainer = document.getElementById(id + '-saved');

  function saveValue() {
    if(validatorFn(input.value)){
      localStorage.setItem(storageKey, input.value);
      renderChips();
      input.classList.remove('invalid');
      return true;
    } else {
      input.classList.add('invalid');
      return false;
    }
  }

  function renderChips() {
    savedContainer.innerHTML='';
    const val = localStorage.getItem(storageKey);
    if(!val) return;
    const label = document.createElement('span');
    label.className='saved-label';
    label.textContent='Saved:';
    savedContainer.appendChild(label);

    const chip = document.createElement('span');
    chip.className='saved-chip';
    chip.textContent=val;
    chip.onclick=()=>{ input.value = val; saveValue(); };
    savedContainer.appendChild(chip);
  }

  input.addEventListener('input', ()=>{
    input.value = formatFn(input.value);
    saveValue();
  });

  renderChips();

  return {input, saveValue, renderChips};
}

// Formatting functions
function formatDOB(val){
  val = val.toUpperCase().replace(/[^0-9A-Z]/g,'');
  if(val.length>2 && val.length<=5) val = val.slice(0,2)+'-'+val.slice(2);
  else if(val.length>5) val = val.slice(0,2)+'-'+val.slice(2,5)+'-'+val.slice(5,9);
  return val;
}

function formatPostal(val){
  val = val.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(val.length>3) val = val.slice(0,3)+' '+val.slice(3,6);
  return val;
}

function formatRAMQ(val){
  val = val.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(val.length>4 && val.length<=8) val = val.slice(0,4)+' '+val.slice(4);
  else if(val.length>8) val = val.slice(0,4)+' '+val.slice(4,8)+' '+val.slice(8,12);
  return val;
}

// Validators
function dobValidator(val){
  const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const match = val.match(/^(\d{2})-([A-Z]{3})-(\d{4})$/);
  if(!match) return false;
  const day=parseInt(match[1]);
  const month=match[2];
  const year=parseInt(match[3]);
  if(day<1||day>31) return false;
  if(!months.includes(month)) return false;
  if(year<1900||year>2099) return false;
  return true;
}

function postalValidator(val){
  return /^[A-Z]\d[A-Z] \d[A-Z]\d$/i.test(val);
}

function ramqValidator(val){
  return /^[A-Z]{4} \d{4} \d{4}$/i.test(val);
}

// Initialize fields
const dobField = initField('dob','pattern_DOB',formatDOB,dobValidator);
const postalField = initField('postal','pattern_Postal',formatPostal,postalValidator);
const ramqField = initField('ramq','pattern_RAMQ',formatRAMQ,ramqValidator);

// Submit & clear
document.getElementById('submit-btn').addEventListener('click',()=>{
  const allValid = dobField.saveValue() & postalField.saveValue() & ramqField.saveValue();
  const report = `
Date of Birth: ${dobField.input.value}
Postal Code: ${postalField.input.value}
RAMQ: ${ramqField.input.value}`;
  document.getElementById('report').innerText = report;
  if(allValid){
    dobField.input.value='';
    postalField.input.value='';
    ramqField.input.value='';
  }
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  [dobField, postalField, ramqField].forEach(f=>{
    localStorage.removeItem(f.input.id==='dob'?'pattern_DOB':f.input.id==='postal'?'pattern_Postal':'pattern_RAMQ');
    f.input.value='';
    f.renderChips();
  });
  document.getElementById('report').innerText='';
});
</script>

</body>
</html>
