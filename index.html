<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Input</title>

<style>
body { font-family: Arial; padding: 20px; }

.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; }

.pattern-container {
  display: flex;
  gap: 4px;
}

.box {
  width: 32px;
  height: 40px;
  text-align: center;
  font-size: 18px;
}

.literal {
  padding: 10px 4px;
}

.saved-values {
  margin-top: 8px;
}

.saved-chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 4px 4px 0 0;
  background: #e0e7ff;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="form-area"></div>

<br>
<button onclick="submitForm()">Submit</button>
<button onclick="clearForm()">Clear</button>

<div id="report" style="margin-top:20px; font-weight:bold;"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  function createField(parent, labelText, pattern) {

    const storageKey = "pattern_" + labelText;

    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = labelText;
    field.appendChild(label);

    const container = document.createElement("div");
    container.className = "pattern-container";
    field.appendChild(container);

    const savedContainer = document.createElement("div");
    savedContainer.className = "saved-values";
    field.appendChild(savedContainer);

    parent.appendChild(field);

    const inputs = [];

    function getValue() {
      return inputs.map(i => i.value).join("");
    }

    function save() {
      const val = getValue();
      if (!val) return;

      localStorage.setItem(storageKey, val);
      renderSaved();
    }

    function fillFromValue(val) {
      for (let i = 0; i < inputs.length && i < val.length; i++) {
        inputs[i].value = val[i];
      }
    }

    function renderSaved() {
      savedContainer.innerHTML = "";

      const val = localStorage.getItem(storageKey);
      if (!val) return;

      const chip = document.createElement("div");
      chip.className = "saved-chip";
      chip.textContent = val;

      chip.onclick = () => fillFromValue(val);

      savedContainer.appendChild(chip);
    }

    pattern.split("").forEach(token => {

      if (token === "A" || token === "N" || token === "X") {

        const input = document.createElement("input");
        input.className = "box";
        input.maxLength = 1;

        if (token === "A") input.pattern = "[A-Za-z]";
        if (token === "N") input.pattern = "[0-9]";
        if (token === "X") input.pattern = "[A-Za-z0-9]";

        container.appendChild(input);
        inputs.push(input);

      } else {
        const span = document.createElement("span");
        span.className = "literal";
        span.textContent = token;
        container.appendChild(span);
      }
    });

    inputs.forEach((input, idx) => {

      input.addEventListener("keydown", (e) => {

        if (e.key.length === 1) {
          e.preventDefault();
          const char = e.key.toUpperCase();

          if (char.match(input.pattern)) {
            input.value = char;

            if (idx < inputs.length - 1) {
              inputs[idx + 1].focus();
            }

            save();
          }
        }

        if (e.key === "Backspace") {
          e.preventDefault();

          if (input.value === "" && idx > 0) {
            inputs[idx - 1].focus();
            inputs[idx - 1].value = "";
          } else {
            input.value = "";
          }

          save();
        }
      });

      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").toUpperCase();

        for (let i = 0; i < text.length && (idx + i) < inputs.length; i++) {
          inputs[idx + i].value = text[i];
        }

        save();
      });
    });

    renderSaved();

    return { inputs, getValue, labelText };
  }

  const parent = document.getElementById("form-area");

  const fields = [
    createField(parent, "Date of Birth", "NN-AAA-NNNN"),
    createField(parent, "Postal Code", "ANA NAN"),
    createField(parent, "RAMQ", "AAAA NNNN NNNN")
  ];

  window.submitForm = function() {

    let output = "";

    fields.forEach(f => {
      output += f.labelText + ": " + f.getValue() + "\\n";
    });

    document.getElementById("report").innerText = output;
  };

  window.clearForm = function() {

    fields.forEach(f => {

      const key = "pattern_" + f.labelText;

      f.inputs.forEach(i => i.value = "");

      localStorage.removeItem(key);
    });

    document.getElementById("report").innerText = "";
    location.reload(); // simple refresh to reset chips
  };

});
</script>

</body>
</html>
