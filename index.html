<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Input Engine v4</title>
<style>
body { font-family: Arial; padding: 20px; }
.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; display: block; }
input { 
  font-size: 18px; padding: 6px; width: 180px; 
  margin-right: 8px; border: 1px solid #ccc; border-radius: 4px;
}
input.invalid { border-color: red; background: #ffd6d6; }
.saved-values { margin-top: 6px; font-size: 13px; }
.saved-label { color: #666; margin-bottom: 3px; display: block; }
.saved-chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 3px 6px 0 0;
  background: #e0e7ff;
  border-radius: 12px;
  cursor: pointer;
}
button { margin-right: 10px; padding: 10px 15px; }
</style>
</head>
<body>

<div class="field">
  <label class="label" for="dob">Date of Birth (DD-MMM-YYYY)</label>
  <input id="dob" type="text" autocomplete="bday" inputmode="numeric" maxlength="11" placeholder="DD-MMM-YYYY">
  <div id="dob-saved" class="saved-values"></div>
</div>

<div class="field">
  <label class="label" for="postal">Postal Code (ANA NAN)</label>
  <input id="postal" type="text" autocomplete="postal-code" inputmode="text" maxlength="7" placeholder="H0H 0H0">
  <div id="postal-saved" class="saved-values"></div>
</div>

<div class="field">
  <label class="label" for="ramq">RAMQ (AAAA NNNN NNNN)</label>
  <input id="ramq" type="text" autocomplete="off" inputmode="text" maxlength="13" placeholder="AAAA 1234 1234">
  <div id="ramq-saved" class="saved-values"></div>
</div>

<br>
<button id="submit-btn">Submit</button>
<button id="clear-btn">Clear</button>

<div id="report" style="margin-top:20px; font-weight:bold;"></div>

<script>
// ================= Helper Functions =================
function createField(id, storageKey, pattern, placeholder) {
  const input = document.getElementById(id);
  const savedContainer = document.getElementById(id+'-saved');

  // Live formatting & validation
  function formatAndValidate() {
    let val = input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
    let formatted='';
    let valid=true;
    let j=0;
    for(let i=0;i<pattern.length;i++){
      if(pattern[i]==='N'){
        if(val[j] && /\d/.test(val[j])) formatted+=val[j++];
        else { valid=false; break; }
      } else if(pattern[i]==='A'){
        if(val[j] && /[A-Z]/.test(val[j])) formatted+=val[j++];
        else { valid=false; break; }
      } else {
        formatted += pattern[i];
      }
    }
    input.value = formatted;
    input.classList.toggle('invalid', !valid);
    return valid && formatted.length===pattern.length;
  }

  function saveValue() {
    if(formatAndValidate()){
      let stored = JSON.parse(localStorage.getItem(storageKey)||"[]");
      if(!stored.includes(input.value)) stored.unshift(input.value);
      localStorage.setItem(storageKey, JSON.stringify(stored.slice(0,5))); // max 5 entries
      renderChips();
      return true;
    }
    return false;
  }

  function renderChips() {
    savedContainer.innerHTML='';
    let stored = JSON.parse(localStorage.getItem(storageKey)||"[]");
    if(stored.length===0) return;
    const label = document.createElement('span');
    label.className='saved-label';
    label.textContent='Saved:';
    savedContainer.appendChild(label);
    stored.forEach(v=>{
      const chip=document.createElement('span');
      chip.className='saved-chip';
      chip.textContent=v;
      chip.onclick=()=>{ input.value=v; formatAndValidate(); };
      savedContainer.appendChild(chip);
    });
  }

  input.addEventListener('input', formatAndValidate);
  input.addEventListener('blur', saveValue);

  renderChips();

  return {input, saveValue, renderChips};
}

// ================= Initialize Fields =================
const dobField = createField('dob','pattern_DOB','NNNAAANNNN','DD-MMM-YYYY');
const postalField = createField('postal','pattern_Postal','ANANAN','ANA NAN'); // will insert space in formatting
const ramqField = createField('ramq','pattern_RAMQ','AAAANNNNNNNN','AAAA 1234 1234');

// Special formatting for postal code (insert space)
postalField.input.addEventListener('input', ()=>{
  let v = postalField.input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(v.length>3) v=v.slice(0,3)+' '+v.slice(3,6);
  postalField.input.value=v;
});

// Special formatting for RAMQ (insert spaces)
ramqField.input.addEventListener('input', ()=>{
  let v = ramqField.input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(v.length>4 && v.length<=8) v=v.slice(0,4)+' '+v.slice(4);
  else if(v.length>8) v=v.slice(0,4)+' '+v.slice(4,8)+' '+v.slice(8,12);
  ramqField.input.value=v;
});

// ================= Submit & Clear =================
document.getElementById('submit-btn').addEventListener('click',()=>{
  const allValid = dobField.saveValue() & postalField.saveValue() & ramqField.saveValue();
  const report = `
Date of Birth: ${dobField.input.value}
Postal Code: ${postalField.input.value}
RAMQ: ${ramqField.input.value}`;
  document.getElementById('report').innerText = report;
  if(allValid){
    dobField.input.value='';
    postalField.input.value='';
    ramqField.input.value='';
  }
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  [dobField, postalField, ramqField].forEach(f=>{
    localStorage.removeItem(f.input.id==='dob'?'pattern_DOB':f.input.id==='postal'?'pattern_Postal':'pattern_RAMQ');
    f.input.value='';
    f.renderChips();
  });
  document.getElementById('report').innerText='';
});
</script>

</body>
</html>
