<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Input</title>

<style>
body { font-family: Arial; padding: 20px; }

.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; }

.pattern-container {
  display: flex;
  gap: 4px;
}

.box-wrapper {
  position: relative;
}

.box {
  width: 32px;
  height: 40px;
  text-align: center;
  font-size: 18px;
  position: relative;
  z-index: 2;
  background: transparent;
}

.ghost {
  position: absolute;
  top: 0;
  left: 0;
  width: 32px;
  height: 40px;
  text-align: center;
  line-height: 40px;
  font-size: 18px;
  color: #bbb;
  z-index: 1;
  pointer-events: none;
}

.literal {
  padding: 10px 4px;
}

.invalid { border: 2px solid red; }

button {
  margin-right: 10px;
  padding: 10px 15px;
}
</style>
</head>

<body>

<div id="form-area"></div>

<br>
<button onclick="submitForm()">Submit</button>
<button onclick="clearForm()">Clear</button>

<script>
document.addEventListener("DOMContentLoaded", function() {

  function createField(parent, labelText, pattern) {

    const storageKey = "pattern_" + labelText;

    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = labelText;
    field.appendChild(label);

    const container = document.createElement("div");
    container.className = "pattern-container";
    field.appendChild(container);

    parent.appendChild(field);

    const inputs = [];
    const ghosts = [];

    function getValue() {
      return inputs.map(i => i.value).join("");
    }

    function save() {
      localStorage.setItem(storageKey, getValue());
    }

    function loadGhost() {
      const val = localStorage.getItem(storageKey);
      if (!val) return;

      for (let i = 0; i < ghosts.length && i < val.length; i++) {
        ghosts[i].textContent = val[i];
      }
    }

    function clearGhosts() {
      ghosts.forEach(g => g.textContent = "");
    }

    pattern.split("").forEach(token => {

      if (token === "A" || token === "N" || token === "X") {

        const wrapper = document.createElement("div");
        wrapper.className = "box-wrapper";

        const ghost = document.createElement("div");
        ghost.className = "ghost";

        const input = document.createElement("input");
        input.className = "box";
        input.maxLength = 1;

        if (token === "A") input.pattern = "[A-Za-z]";
        if (token === "N") input.pattern = "[0-9]";
        if (token === "X") input.pattern = "[A-Za-z0-9]";

        wrapper.appendChild(ghost);
        wrapper.appendChild(input);
        container.appendChild(wrapper);

        inputs.push(input);
        ghosts.push(ghost);

      } else {
        const span = document.createElement("span");
        span.className = "literal";
        span.textContent = token;
        container.appendChild(span);
      }
    });

    inputs.forEach((input, idx) => {

      input.addEventListener("focus", () => {
        loadGhost();
      });

      input.addEventListener("keydown", (e) => {

        if (e.key.length === 1) {
          e.preventDefault();
          const char = e.key.toUpperCase();

          if (char.match(input.pattern)) {

            input.value = char;
            ghosts[idx].textContent = "";
            input.classList.remove("invalid");

            save();

            if (idx < inputs.length - 1) {
              inputs[idx + 1].focus();
            }

          } else {
            input.classList.add("invalid");
          }
        }

        if (e.key === "Backspace") {
          e.preventDefault();

          if (input.value === "" && idx > 0) {
            inputs[idx - 1].focus();
            inputs[idx - 1].value = "";
          } else {
            input.value = "";
          }

          save();
        }
      });

      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").toUpperCase();

        for (let i = 0; i < text.length && (idx + i) < inputs.length; i++) {
          inputs[idx + i].value = text[i];
          ghosts[idx + i].textContent = "";
        }

        save();
      });
    });

    return { inputs, getValue, labelText };
  }

  const parent = document.getElementById("form-area");

  const fields = [
    createField(parent, "Date of Birth", "NN-AAA-NNNN"),
    createField(parent, "Postal Code", "ANA NAN"),
    createField(parent, "RAMQ", "AAAA NNNN NNNN")
  ];

  window.submitForm = function() {

    let output = "";

    fields.forEach(f => {
      output += f.labelText + ": " + f.getValue() + "\\n";
    });

    alert(output);
    console.log(output);

    clearForm();
  };

  window.clearForm = function() {

    fields.forEach(f => {

      const storageKey = "pattern_" + f.labelText;

      f.inputs.forEach(input => {
        input.value = "";
        input.classList.remove("invalid");
      });

      localStorage.removeItem(storageKey);
    });
  };

});
</script>

</body>
</html>
