<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Input</title>

<style>
body { font-family: Arial; padding: 20px; }

.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; }

.pattern-container {
  display: flex;
  gap: 4px;
}

.box {
  width: 32px;
  height: 40px;
  text-align: center;
  font-size: 18px;
}

.literal {
  padding: 10px 4px;
}

.invalid {
  background-color: #ffd6d6;
}

.saved-values {
  margin-top: 6px;
  font-size: 13px;
}

.saved-label {
  color: #666;
  margin-bottom: 3px;
}

.saved-chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 3px 6px 0 0;
  background: #e0e7ff;
  border-radius: 12px;
  cursor: pointer;
}

button {
  margin-right: 10px;
  padding: 10px 15px;
}
</style>
</head>

<body>

<div id="form-area"></div>

<br>
<button onclick="submitForm()">Submit</button>
<button onclick="clearForm()">Clear</button>

<div id="report" style="margin-top:20px; font-weight:bold;"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  document.body.setAttribute("autocomplete", "off");

  function createField(parent, labelText, pattern) {

    const storageKey = "pattern_" + labelText;

    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = labelText;
    field.appendChild(label);

    const container = document.createElement("div");
    container.className = "pattern-container";
    field.appendChild(container);

    const savedContainer = document.createElement("div");
    savedContainer.className = "saved-values";
    field.appendChild(savedContainer);

    parent.appendChild(field);

    const inputs = [];
    const tokens = pattern.split("").filter(t => t==="A"||t==="N"||t==="X");

    function getValue() {
      let result = "";
      let inputIndex = 0;

      pattern.split("").forEach(token => {
        if (token === "A" || token === "N" || token === "X") {
          result += inputs[inputIndex].value || "";
          inputIndex++;
        } else {
          result += token;
        }
      });

      return result;
    }

    function validate() {
      let valid = true;
      inputs.forEach(i => i.classList.remove("invalid"));

      if (labelText === "Date of Birth") {

        const day = inputs[0].value + inputs[1].value;
        const month = inputs[2].value + inputs[3].value + inputs[4].value;
        const year = inputs.slice(5,9).map(i=>i.value).join("");

        if (day && (parseInt(day) < 1 || parseInt(day) > 31)) {
          inputs[0].classList.add("invalid");
          inputs[1].classList.add("invalid");
          valid = false;
        }

        const validMonths = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        if (month && !validMonths.includes(month)) {
          inputs[2].classList.add("invalid");
          inputs[3].classList.add("invalid");
          inputs[4].classList.add("invalid");
          valid = false;
        }

        if (year && (parseInt(year) < 1900 || parseInt(year) > 2099)) {
          inputs.slice(5,9).forEach(i=>i.classList.add("invalid"));
          valid = false;
        }
      }

      return valid;
    }

    function save() {
      if (inputs.some(i => i.value === "")) return;
      if (!validate()) return;

      localStorage.setItem(storageKey, getValue());
      renderSaved();
    }

    function fill(val) {
      let inputIndex = 0;

      pattern.split("").forEach((token, i) => {
        if (token === "A" || token === "N" || token === "X") {
          inputs[inputIndex].value = val[i] || "";
          inputIndex++;
        }
      });
    }

    function renderSaved() {
      savedContainer.innerHTML = "";

      const val = localStorage.getItem(storageKey);
      if (!val) return;

      const label = document.createElement("div");
      label.className = "saved-label";
      label.textContent = "Saved:";
      savedContainer.appendChild(label);

      const chip = document.createElement("div");
      chip.className = "saved-chip";
      chip.textContent = val;

      chip.onclick = () => fill(val);

      savedContainer.appendChild(chip);
    }

    pattern.split("").forEach(token => {

      if (token === "A" || token === "N" || token === "X") {

        const input = document.createElement("input");
        input.className = "box";
        input.maxLength = 1;

        // 🔑 KEY FIX: iPhone keyboard switching
        if (token === "N") {
          input.setAttribute("inputmode", "numeric");
        } else {
          input.setAttribute("inputmode", "text");
        }

        input.setAttribute("autocomplete", "off");
        input.setAttribute("autocorrect", "off");
        input.setAttribute("autocapitalize", "characters");
        input.setAttribute("spellcheck", "false");

        container.appendChild(input);
        inputs.push(input);

      } else {
        const span = document.createElement("span");
        span.className = "literal";
        span.textContent = token;
        container.appendChild(span);
      }
    });

    inputs.forEach((input, idx) => {

      input.addEventListener("input", () => {

        let val = input.value.toUpperCase();
        const token = tokens[idx];

        if (token === "A" && !/[A-Z]/.test(val)) val = "";
        if (token === "N" && !/[0-9]/.test(val)) val = "";
        if (token === "X" && !/[A-Z0-9]/.test(val)) val = "";

        input.value = val;

        if (val && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }

        // 🔑 KEY FIX: force Chrome repaint
        setTimeout(() => {
          validate();
          save();
        }, 0);
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "" && idx > 0) {
          inputs[idx - 1].focus();
        }
      });

      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").toUpperCase();

        for (let i = 0; i < text.length && (idx + i) < inputs.length; i++) {
          inputs[idx + i].value = text[i];
        }

        validate();
        save();
      });
    });

    renderSaved();

    return { inputs, getValue, labelText };
  }

  const parent = document.getElementById("form-area");

  const fields = [
    createField(parent, "Date of Birth", "NN-AAA-NNNN"),
    createField(parent, "Postal Code", "ANA NAN"),
    createField(parent, "RAMQ", "AAAA NNNN NNNN")
  ];

  window.submitForm = function() {

    let output = "";
    let allValid = true;

    fields.forEach(f => {
      if (f.inputs.some(i => i.classList.contains("invalid"))) {
        allValid = false;
      }
      output += f.labelText + ": " + f.getValue() + "\n";
    });

    document.getElementById("report").innerText = output;

    if (!allValid) return;

    fields.forEach(f => {
      f.inputs.forEach(i => i.value = "");
    });
  };

  window.clearForm = function() {

    fields.forEach(f => {
      localStorage.removeItem("pattern_" + f.labelText);
      f.inputs.forEach(i => i.value = "");
    });

    document.getElementById("report").innerText = "";

    document.getElementById("form-area").innerHTML = "";

    const newFields = [
      createField(parent, "Date of Birth", "NN-AAA-NNNN"),
      createField(parent, "Postal Code", "ANA NAN"),
      createField(parent, "RAMQ", "AAAA NNNN NNNN")
    ];

    fields.length = 0;
    newFields.forEach(f => fields.push(f));
  };

});
</script>

</body>
</html>
