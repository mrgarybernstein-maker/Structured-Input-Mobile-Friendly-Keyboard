<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Input Engine v5</title>
<style>
body { font-family: Arial; padding: 20px; }
.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; display: block; }
.char-box {
  width: 30px; font-size: 18px; text-align: center; padding: 6px;
  margin-right: 4px; border: 1px solid #ccc; border-radius: 4px;
}
.char-box.invalid { border-color: red; background: #ffd6d6; }
.saved-values { margin-top: 6px; font-size: 13px; }
.saved-label { color: #666; margin-bottom: 3px; display: block; }
.saved-chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 3px 6px 0 0;
  background: #e0e7ff;
  border-radius: 12px;
  cursor: pointer;
}
button { margin-right: 10px; padding: 10px 15px; }
</style>
</head>
<body>

<div class="field" id="dob-field">
  <label class="label">Date of Birth (DD-MMM-YYYY)</label>
</div>
<div class="saved-values" id="dob-saved"></div>

<div class="field" id="postal-field">
  <label class="label">Postal Code (ANA NAN)</label>
</div>
<div class="saved-values" id="postal-saved"></div>

<div class="field" id="ramq-field">
  <label class="label">RAMQ (AAAA NNNN NNNN)</label>
</div>
<div class="saved-values" id="ramq-saved"></div>

<br>
<button id="submit-btn">Submit</button>
<button id="clear-btn">Clear</button>

<div id="report" style="margin-top:20px; font-weight:bold;"></div>

<script>
// ========== Helper Functions ==========
function createCharInputs(containerId, pattern, storageKey) {
  const container = document.getElementById(containerId);
  const savedContainer = document.getElementById(containerId+'-saved');
  const boxes = [];
  const hiddenInput = document.createElement('input');
  hiddenInput.type='hidden';
  container.appendChild(hiddenInput);

  pattern.split('').forEach((p,i)=>{
    if(p==='N' || p==='A'){
      const input = document.createElement('input');
      input.type='text';
      input.maxLength=1;
      input.className='char-box';
      input.inputMode = p==='N'?'numeric':'text';
      container.appendChild(input);
      boxes.push({input, type:p});
      input.addEventListener('input', ()=>{
        if(input.value.length>0){
          input.value = p==='N'?input.value.replace(/\D/,''):input.value.replace(/[^A-Za-z]/,'').toUpperCase();
          // auto-advance
          let next = boxes.findIndex(b=>b.input===input)+1;
          if(next<boxes.length) boxes[next].input.focus();
        }
        updateHidden();
      });
      input.addEventListener('keydown',(e)=>{
        if(e.key==='Backspace' && input.value===''){
          let prev = boxes.findIndex(b=>b.input===input)-1;
          if(prev>=0) boxes[prev].input.focus();
        }
      });
    } else {
      // static delimiter
      const span = document.createElement('span');
      span.textContent=p;
      span.style.marginRight='2px';
      container.appendChild(span);
    }
  });

  function updateHidden(){
    hiddenInput.value = boxes.map(b=>b.input.value).join('');
    validate();
  }

  function validate(){
    let valid = true;
    boxes.forEach(b=>{
      if(b.type==='N' && !/\d/.test(b.input.value)) { b.input.classList.add('invalid'); valid=false;}
      else if(b.type==='A' && !/[A-Z]/.test(b.input.value)) { b.input.classList.add('invalid'); valid=false;}
      else b.input.classList.remove('invalid');
    });
    return valid && boxes.every(b=>b.input.value.length>0);
  }

  function saveValue(){
    if(validate()){
      let stored = JSON.parse(localStorage.getItem(storageKey)||"[]");
      if(!stored.includes(hiddenInput.value)) stored.unshift(hiddenInput.value);
      localStorage.setItem(storageKey, JSON.stringify(stored.slice(0,5)));
      renderChips();
      return true;
    }
    return false;
  }

  function renderChips(){
    savedContainer.innerHTML='';
    let stored = JSON.parse(localStorage.getItem(storageKey)||"[]");
    if(stored.length===0) return;
    const label = document.createElement('span');
    label.className='saved-label';
    label.textContent='Saved:';
    savedContainer.appendChild(label);
    stored.forEach(v=>{
      const chip=document.createElement('span');
      chip.className='saved-chip';
      chip.textContent=v;
      chip.onclick=()=>{ fillFromValue(v); };
      savedContainer.appendChild(chip);
    });
  }

  function fillFromValue(val){
    let i=0;
    boxes.forEach(b=>{
      b.input.value = val[i++] || '';
    });
    updateHidden();
  }

  function clearAll(){
    boxes.forEach(b=>b.input.value='');
    updateHidden();
    renderChips();
  }

  renderChips();
  return {saveValue, clearAll, hiddenInput};
}

// ========== Initialize Fields ==========
const dob = createCharInputs('dob-field','NN-AAA-NNNN','pattern_DOB');
const postal = createCharInputs('postal-field','ANA NAN','pattern_Postal');
const ramq = createCharInputs('ramq-field','AAAA NNNN NNNN','pattern_RAMQ');

// ========== Submit & Clear ==========
document.getElementById('submit-btn').addEventListener('click',()=>{
  const allValid = dob.saveValue() & postal.saveValue() & ramq.saveValue();
  const report = `
Date of Birth: ${dob.hiddenInput.value}
Postal Code: ${postal.hiddenInput.value}
RAMQ: ${ramq.hiddenInput.value}`;
  document.getElementById('report').innerText = report;
  if(allValid){
    dob.clearAll();
    postal.clearAll();
    ramq.clearAll();
  }
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  [dob,postal,ramq].forEach(f=>{
    localStorage.removeItem(f===dob?'pattern_DOB':f===postal?'pattern_Postal':'pattern_RAMQ');
    f.clearAll();
  });
  document.getElementById('report').innerText='';
});
</script>

</body>
</html>
