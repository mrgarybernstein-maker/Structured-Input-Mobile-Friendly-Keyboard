<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Engine App</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #f5f7fb;
  padding: 15px;
}

h2 { text-align: center; }

.field {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.label {
  font-weight: 600;
  margin-bottom: 10px;
}

.pattern-container {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
}

.box {
  width: 42px;
  height: 50px;
  font-size: 20px;
  text-align: center;
  margin: 2px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

.box:focus {
  border-color: #007aff;
  background: #eef5ff;
  outline: none;
}

.box.invalid {
  border-color: red;
}

.literal {
  font-size: 20px;
  margin: 2px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #007aff;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Structured Input</h2>

<form>
  <div id="form-area"></div>
</form>

<button onclick="submitForm()">Submit</button>

<script>
function createPatternField(parentId, labelText, pattern) {

  const storageKey = "pattern_" + labelText;

  const parent = document.getElementById(parentId);

  const field = document.createElement("div");
  field.className = "field";

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = labelText + " (" + pattern + ")";
  field.appendChild(label);

  const container = document.createElement("div");
  container.className = "pattern-container";
  field.appendChild(container);

  parent.appendChild(field);

  const tokens = pattern.split("");
  const inputs = [];

  tokens.forEach(token => {
    if (["A","N","X"].includes(token)) {
      const input = document.createElement("input");
      input.className = "box";
      input.maxLength = 1;

      if (token === "A") {
        input.inputMode = "text";
        input.pattern = "[A-Za-z]";
      }
      if (token === "N") {
        input.inputMode = "numeric";
        input.pattern = "[0-9]";
      }
      if (token === "X") {
        input.inputMode = "text";
        input.pattern = "[A-Za-z0-9]";
      }

      container.appendChild(input);
      inputs.push(input);

    } else {
      const span = document.createElement("span");
      span.className = "literal";
      span.textContent = token;
      container.appendChild(span);
    }
  });

  function getValue() {
    let combined = "";
    container.childNodes.forEach(node => {
      if(node.tagName==="INPUT") combined += node.value;
      else combined += node.textContent;
    });
    return combined;
  }

  function saveValue() {
    localStorage.setItem(storageKey, getValue());
  }

  function loadValue() {
    const saved = localStorage.getItem(storageKey);
    if (!saved) return;

    let i = 0;
    inputs.forEach(input => {
      if (i < saved.length) {
        input.value = saved[i];
        i++;
      }
    });
  }

  inputs.forEach((input, idx) => {

    input.addEventListener("keydown", (e) => {

      // CHARACTER ENTRY (desktop + mobile safe)
      if (e.key.length === 1) {
        e.preventDefault();
        const char = e.key.toUpperCase();

        if (char.match(input.pattern)) {
          input.value = char;
          input.classList.remove("invalid");

          saveValue();

          if(idx < inputs.length - 1) {
            inputs[idx+1].focus();
          }
        } else {
          input.classList.add("invalid");
        }
      }

      // BACKSPACE
      if(e.key === "Backspace"){
        e.preventDefault();

        if(input.value === ""){
          if(idx > 0){
            inputs[idx-1].focus();
            inputs[idx-1].value = "";
          }
        } else {
          input.value = "";
        }

        saveValue();
      }
    });

    // PASTE SUPPORT
    input.addEventListener("paste", (e)=>{
      e.preventDefault();
      const pasteData = e.clipboardData.getData("text").toUpperCase();

      for(let i=0;i<pasteData.length && (idx+i)<inputs.length;i++){
        const char = pasteData[i];

        if (char.match(inputs[idx+i].pattern)) {
          inputs[idx+i].value = char;
          inputs[idx+i].classList.remove("invalid");
        } else {
          inputs[idx+i].classList.add("invalid");
        }
      }

      saveValue();
    });
  });

  loadValue();

  return { getValue, inputs, labelText };
}

// CONFIG
const formConfig = [
  { label: "Date of Birth", pattern: "NN-AAA-NNNN" },
  { label: "Postal Code", pattern: "ANA NAN" },
  { label: "RAMQ", pattern: "AAAA NNNN NNNN" }
];

const builtFields = [];

formConfig.forEach(f => {
  builtFields.push(createPatternField("form-area", f.label, f.pattern));
});

// SUBMIT
function submitForm() {
  let allValid = true;
  let summary = "Submitted:\n\n";

  builtFields.forEach(field => {
    const value = field.getValue();

    field.inputs.forEach(input => {
      if (!input.value.match(input.pattern)) {
        input.classList.add("invalid");
        allValid = false;
      }
    });

    summary += field.labelText + ": " + value + "\n";
  });

  if (!allValid) {
    alert("Please fix invalid fields");
    return;
  }

  alert(summary);
}
</script>

</body>
</html>
