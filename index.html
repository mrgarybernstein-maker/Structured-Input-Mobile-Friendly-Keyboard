<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Engine</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.field {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.field.invalid-field {
  background: #ffecec;
  border: 1px solid red;
}

.label {
  font-weight: bold;
  margin-bottom: 10px;
}

.pattern-container {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
}

.box {
  width: 28px;
  height: 40px;
  text-align: center;
  font-size: 18px;
  margin-right: 4px;
}

.box.invalid {
  border-color: red;
  background: #fff0f0;
}

.literal {
  margin: 0 4px;
  font-size: 18px;
}

button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  background: #007bff;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="success-message" style="
  display:none;
  background:#e6ffed;
  color:#1a7f37;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
  text-align:center;
  font-weight:bold;
">
  ✅ Form submitted successfully
</div>

<div id="form-area"></div>

<button type="button" onclick="submitForm()">Submit</button>
<button type="button" onclick="resetForm()" style="margin-left:10px;">Reset</button>

<script>
document.addEventListener("DOMContentLoaded", function() {

  function createPatternField(parentId, labelText, pattern) {

    const storageKey = "pattern_" + labelText;
    const parent = document.getElementById(parentId);

    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = labelText + " (" + pattern + ")";
    field.appendChild(label);

    const container = document.createElement("div");
    container.className = "pattern-container";
    field.appendChild(container);

    parent.appendChild(field);

    const tokens = pattern.split("");
    const inputs = [];

    tokens.forEach(token => {
      if (["A","N","X"].includes(token)) {
        const input = document.createElement("input");
        input.className = "box";
        input.maxLength = 1;

        if (token === "A") {
          input.inputMode = "text";
          input.pattern = "[A-Za-z]";
        }
        if (token === "N") {
          input.inputMode = "numeric";
          input.pattern = "[0-9]";
        }
        if (token === "X") {
          input.inputMode = "text";
          input.pattern = "[A-Za-z0-9]";
        }

        container.appendChild(input);
        inputs.push(input);

      } else {
        const span = document.createElement("span");
        span.className = "literal";
        span.textContent = token;
        container.appendChild(span);
      }
    });

    function getValue() {
      let combined = "";
      container.childNodes.forEach(node => {
        if (node.tagName === "INPUT") combined += node.value;
        else combined += node.textContent;
      });
      return combined;
    }

    function saveValue() {
      localStorage.setItem(storageKey, getValue());
    }

    inputs.forEach((input, idx) => {

      input.addEventListener("keydown", (e) => {

        if (e.key.length === 1) {
          e.preventDefault();
          const char = e.key.toUpperCase();

          if (char.match(input.pattern)) {
            input.value = char;
            input.classList.remove("invalid");

            const fieldDiv = input.closest(".field");
            if (fieldDiv) fieldDiv.classList.remove("invalid-field");

            saveValue();

            if (idx < inputs.length - 1) {
              inputs[idx + 1].focus();
            }
          } else {
            input.classList.add("invalid");
          }
        }

        if (e.key === "Backspace") {
          e.preventDefault();

          if (input.value === "") {
            if (idx > 0) {
              inputs[idx - 1].focus();
              inputs[idx - 1].value = "";
            }
          } else {
            input.value = "";
          }

          saveValue();
        }
      });

      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData("text").toUpperCase();

        for (let i = 0; i < pasteData.length && (idx + i) < inputs.length; i++) {
          const char = pasteData[i];

          if (char.match(inputs[idx + i].pattern)) {
            inputs[idx + i].value = char;
            inputs[idx + i].classList.remove("invalid");
          } else {
            inputs[idx + i].classList.add("invalid");
          }
        }

        const fieldDiv = input.closest(".field");
        if (fieldDiv) fieldDiv.classList.remove("invalid-field");

        saveValue();
      });
    });

    return { getValue, inputs, labelText };
  }

  const formConfig = [
    { label: "Date of Birth", pattern: "NN-AAA-NNNN" },
    { label: "Postal Code", pattern: "ANA NAN" },
    { label: "RAMQ", pattern: "AAAA NNNN NNNN" }
  ];

  const builtFields = [];

  formConfig.forEach(f => {
    builtFields.push(createPatternField("form-area", f.label, f.pattern));
  });

  window.submitForm = function() {
    let allValid = true;

    builtFields.forEach(field => {
      let fieldValid = true;

      field.inputs.forEach(input => {
        if (!input.value.match(input.pattern)) {
          input.classList.add("invalid");
          fieldValid = false;
          allValid = false;
        } else {
          input.classList.remove("invalid");
        }
      });

      const fieldDiv = field.inputs[0].closest(".field");

      if (fieldDiv) {
        if (!fieldValid) fieldDiv.classList.add("invalid-field");
        else fieldDiv.classList.remove("invalid-field");
      }
    });

    const msg = document.getElementById("success-message");

    if (!allValid) {
      if (msg) msg.style.display = "none";
      return;
    }

    if (msg) msg.style.display = "block";

    resetForm();
  };

  window.resetForm = function() {
    builtFields.forEach(field => {
      const storageKey = "pattern_" + field.labelText;

      field.inputs.forEach(input => {
        input.value = "";
        input.classList.remove("invalid");
      });

      const fieldDiv = field.inputs[0].closest(".field");
      if (fieldDiv) fieldDiv.classList.remove("invalid-field");

      localStorage.removeItem(storageKey);
    });

    if (builtFields.length > 0) {
      builtFields[0].inputs[0].focus();
    }
  };

});
</script>

</body>
</html>
