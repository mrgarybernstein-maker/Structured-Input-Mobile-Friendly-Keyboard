<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Input Engine v2</title>
<style>
body { font-family: Arial; padding: 20px; }
.field { margin-bottom: 25px; }
.label { font-weight: bold; margin-bottom: 8px; display: block; }
input { 
  font-size: 18px; padding: 6px; width: 150px; 
  margin-right: 8px; border: 1px solid #ccc; border-radius: 4px;
}
input.invalid { border-color: red; background: #ffd6d6; }
.saved-values { margin-top: 6px; font-size: 13px; }
.saved-label { color: #666; margin-bottom: 3px; display: block; }
.saved-chip {
  display: inline-block;
  padding: 6px 10px;
  margin: 3px 6px 0 0;
  background: #e0e7ff;
  border-radius: 12px;
  cursor: pointer;
}
button { margin-right: 10px; padding: 10px 15px; }
</style>
</head>
<body>

<div class="field">
  <label class="label" for="dob">Date of Birth (NN-AAA-NNNN)</label>
  <input id="dob" type="text" autocomplete="bday" inputmode="numeric" maxlength="9" placeholder="DD-MMM-YYYY">
  <div id="dob-saved" class="saved-values"></div>
</div>

<div class="field">
  <label class="label" for="postal">Postal Code (ANA NAN)</label>
  <input id="postal" type="text" autocomplete="postal-code" inputmode="text" maxlength="7" placeholder="H0H 0H0">
  <div id="postal-saved" class="saved-values"></div>
</div>

<div class="field">
  <label class="label" for="ramq">RAMQ (AAAA NNNN NNNN)</label>
  <input id="ramq" type="text" autocomplete="off" inputmode="text" maxlength="13" placeholder="AAAA NNNN NNNN">
  <div id="ramq-saved" class="saved-values"></div>
</div>

<br>
<button id="submit-btn">Submit</button>
<button id="clear-btn">Clear</button>

<div id="report" style="margin-top:20px; font-weight:bold;"></div>

<script>
function initField(id, storageKey, validator) {
  const input = document.getElementById(id);
  const savedContainer = document.getElementById(id + '-saved');

  function saveValue() {
    if (validator(input.value)) {
      localStorage.setItem(storageKey, input.value);
      renderChips();
      input.classList.remove('invalid');
      return true;
    } else {
      input.classList.add('invalid');
      return false;
    }
  }

  function renderChips() {
    savedContainer.innerHTML = '';
    const val = localStorage.getItem(storageKey);
    if (!val) return;
    const label = document.createElement('span');
    label.className = 'saved-label';
    label.textContent = 'Saved:';
    savedContainer.appendChild(label);

    const chip = document.createElement('span');
    chip.className = 'saved-chip';
    chip.textContent = val;
    chip.onclick = () => { input.value = val; saveValue(); };
    savedContainer.appendChild(chip);
  }

  input.addEventListener('input', saveValue);

  renderChips();

  return {input, saveValue, renderChips};
}

// Validators
function dobValidator(val) {
  const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const match = val.toUpperCase().match(/^(\d{2})-([A-Z]{3})-(\d{4})$/);
  if (!match) return false;
  const day = parseInt(match[1]);
  const month = match[2];
  const year = parseInt(match[3]);
  if(day<1||day>31) return false;
  if(!months.includes(month)) return false;
  if(year<1900||year>2099) return false;
  return true;
}

function postalValidator(val) {
  return /^[A-Z]\d[A-Z] \d[A-Z]\d$/i.test(val);
}

function ramqValidator(val) {
  return /^[A-Z]{4} \d{4} \d{4}$/i.test(val);
}

// Initialize fields
const dobField = initField('dob','pattern_DOB',dobValidator);
const postalField = initField('postal','pattern_Postal',postalValidator);
const ramqField = initField('ramq','pattern_RAMQ',ramqValidator);

document.getElementById('submit-btn').addEventListener('click',()=>{
  const allValid = dobField.saveValue() & postalField.saveValue() & ramqField.saveValue();
  const report = `
Date of Birth: ${dobField.input.value}
Postal Code: ${postalField.input.value}
RAMQ: ${ramqField.input.value}
  `;
  document.getElementById('report').innerText = report;
  if(allValid){
    dobField.input.value='';
    postalField.input.value='';
    ramqField.input.value='';
  }
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  [dobField, postalField, ramqField].forEach(f=>{
    localStorage.removeItem(f.input.id==='dob'?'pattern_DOB':f.input.id==='postal'?'pattern_Postal':'pattern_RAMQ');
    f.input.value='';
    f.renderChips();
  });
  document.getElementById('report').innerText='';
});
</script>

</body>
</html>
