<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Input Engine v13</title>

<style>
body { font-family: Arial; padding: 20px; }

.field { margin-bottom: 20px; }

label {
  display: block;
  font-weight: bold;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 18px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

input.invalid {
  border-color: red;
  background: #ffd6d6;
}

button {
  margin-right: 10px;
  padding: 10px 15px;
}
</style>
</head>

<body>

<div class="field">
  <label>DOB (DD-MMM-YYYY)</label>
  <input id="dob" placeholder="31-MAR-1980">
</div>

<div class="field">
  <label>Postal Code (ANA NAN)</label>
  <input id="postal" placeholder="H2X 1Y4">
</div>

<div class="field">
  <label>RAMQ (AAAA NNNN NNNN)</label>
  <input id="ramq" placeholder="ABCD 1234 5678">
</div>

<button id="submit">Submit</button>
<button id="clear">Clear</button>

<div id="report" style="margin-top:20px;font-weight:bold;"></div>

<script>
// ===== FORMATTERS =====

// DOB: auto format DD-MMM-YYYY
function formatDOB(value) {
  value = value.replace(/[^A-Za-z0-9]/g, "").toUpperCase();

  let d = value.slice(0,2);
  let m = value.slice(2,5);
  let y = value.slice(5,9);

  let out = d;
  if (m) out += "-" + m;
  if (y) out += "-" + y;

  return out;
}

// Postal: ANA NAN
function formatPostal(value) {
  value = value.replace(/[^A-Za-z0-9]/g, "").toUpperCase();

  let p1 = value.slice(0,3);
  let p2 = value.slice(3,6);

  return p2 ? p1 + " " + p2 : p1;
}

// RAMQ: AAAA NNNN NNNN
function formatRAMQ(value) {
  value = value.replace(/[^A-Za-z0-9]/g, "").toUpperCase();

  let a = value.slice(0,4);
  let n1 = value.slice(4,8);
  let n2 = value.slice(8,12);

  let out = a;
  if (n1) out += " " + n1;
  if (n2) out += " " + n2;

  return out;
}

// ===== VALIDATION =====

function validateDOB(v) {
  return /^\d{2}-[A-Z]{3}-\d{4}$/.test(v);
}

function validatePostal(v) {
  return /^[A-Z]\d[A-Z] \d[A-Z]\d$/.test(v);
}

function validateRAMQ(v) {
  return /^[A-Z]{4} \d{4} \d{4}$/.test(v);
}

// ===== INPUT EVENTS =====

const dob = document.getElementById("dob");
const postal = document.getElementById("postal");
const ramq = document.getElementById("ramq");

dob.addEventListener("input", () => {
  dob.value = formatDOB(dob.value);
});

postal.addEventListener("input", () => {
  postal.value = formatPostal(postal.value);
});

ramq.addEventListener("input", () => {
  ramq.value = formatRAMQ(ramq.value);
});

// ===== BUTTONS =====

document.getElementById("submit").onclick = () => {
  const v1 = validateDOB(dob.value);
  const v2 = validatePostal(postal.value);
  const v3 = validateRAMQ(ramq.value);

  dob.classList.toggle("invalid", !v1);
  postal.classList.toggle("invalid", !v2);
  ramq.classList.toggle("invalid", !v3);

  document.getElementById("report").innerText =
    "DOB: " + dob.value +
    "\nPostal: " + postal.value +
    "\nRAMQ: " + ramq.value;

  if (v1 && v2 && v3) {
    dob.value = "";
    postal.value = "";
    ramq.value = "";
  }
};

document.getElementById("clear").onclick = () => {
  dob.value = "";
  postal.value = "";
  ramq.value = "";
  document.getElementById("report").innerText = "";
};
</script>

</body>
</html>
