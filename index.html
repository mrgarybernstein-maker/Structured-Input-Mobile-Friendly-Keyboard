<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Input</title>

<style>
body { font-family: Arial; padding: 20px; }
.field { margin-bottom: 25px; position: relative; }
.label { font-weight: bold; margin-bottom: 8px; }

.pattern-container {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
}

.box {
  width: 32px;
  height: 40px;
  text-align: center;
  font-size: 18px;
}

.literal {
  padding: 10px 4px;
}

.invalid { border: 2px solid red; }
.invalid-field { background: #ffe6e6; }

.dropdown {
  position: absolute;
  top: 65px;
  left: 0;
  right: 0;
  background: white;
  border: 1px solid #ccc;
  display: none;
  z-index: 10;
}

.dropdown-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div id="form-area"></div>

<br>
<button onclick="submitForm()">Submit</button>

<script>
document.addEventListener("DOMContentLoaded", function() {

  function createField(parent, labelText, pattern) {

    const storageKey = "pattern_" + labelText;

    const field = document.createElement("div");
    field.className = "field";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = labelText;
    field.appendChild(label);

    const container = document.createElement("div");
    container.className = "pattern-container";
    field.appendChild(container);

    const dropdown = document.createElement("div");
    dropdown.className = "dropdown";
    field.appendChild(dropdown);

    parent.appendChild(field);

    const inputs = [];

    function getValue() {
      return inputs.map(i => i.value).join("");
    }

    function save() {
      localStorage.setItem(storageKey, getValue());
    }

    function load() {
      const val = localStorage.getItem(storageKey);
      if (!val) return;

      for (let i = 0; i < inputs.length && i < val.length; i++) {
        inputs[i].value = val[i];
      }
    }

    function showDropdown() {
      const val = localStorage.getItem(storageKey);
      if (!val) return;

      dropdown.innerHTML = "";

      const item = document.createElement("div");
      item.className = "dropdown-item";
      item.textContent = val;

      item.onclick = () => {
        for (let i = 0; i < inputs.length && i < val.length; i++) {
          inputs[i].value = val[i];
        }
        dropdown.style.display = "none";
      };

      dropdown.appendChild(item);
      dropdown.style.display = "block";
    }

    function hideDropdown() {
      dropdown.style.display = "none";
    }

    pattern.split("").forEach(token => {

      if (token === "A" || token === "N" || token === "X") {

        const input = document.createElement("input");
        input.className = "box";
        input.maxLength = 1;

        if (token === "A") input.pattern = "[A-Za-z]";
        if (token === "N") input.pattern = "[0-9]";
        if (token === "X") input.pattern = "[A-Za-z0-9]";

        input.addEventListener("focus", showDropdown);

        container.appendChild(input);
        inputs.push(input);

      } else {
        const span = document.createElement("span");
        span.className = "literal";
        span.textContent = token;
        container.appendChild(span);
      }
    });

    inputs.forEach((input, idx) => {

      input.addEventListener("keydown", (e) => {

        if (e.key.length === 1) {
          e.preventDefault();
          const char = e.key.toUpperCase();

          if (char.match(input.pattern)) {
            input.value = char;
            input.classList.remove("invalid");
            save();
            hideDropdown();

            if (idx < inputs.length - 1) {
              inputs[idx + 1].focus();
            }
          } else {
            input.classList.add("invalid");
          }
        }

        if (e.key === "Backspace") {
          e.preventDefault();

          if (input.value === "" && idx > 0) {
            inputs[idx - 1].focus();
            inputs[idx - 1].value = "";
          } else {
            input.value = "";
          }

          save();
        }
      });

      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").toUpperCase();

        for (let i = 0; i < text.length && (idx + i) < inputs.length; i++) {
          inputs[idx + i].value = text[i];
        }

        save();
        hideDropdown();
      });
    });

    load();

    document.addEventListener("click", (e) => {
      if (!field.contains(e.target)) hideDropdown();
    });

    return { inputs, getValue, labelText };
  }

  const parent = document.getElementById("form-area");

  const fields = [
    createField(parent, "Date of Birth", "NN-AAA-NNNN"),
    createField(parent, "Postal Code", "ANA NAN"),
    createField(parent, "RAMQ", "AAAA NNNN NNNN")
  ];

  window.submitForm = function() {

    let output = "";

    fields.forEach(f => {
      const val = f.getValue();
      output += f.labelText + ": " + val + "\\n";
    });

    console.log(output);
    alert(output);
  };

});
</script>

</body>
</html>
