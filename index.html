<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Input Engine v12</title>
<style>
body { font-family: Arial; padding: 20px; }

.field {
  margin-bottom: 25px;
}

.label {
  font-weight: bold;
  margin-bottom: 8px;
  display: block;
}

.row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
}

.box {
  width: 42px;
  height: 42px;
  text-align: center;
  font-size: 18px;
  margin-right: 4px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.box.invalid {
  border-color: red;
  background: #ffd6d6;
}

.delim {
  margin-right: 6px;
  font-weight: bold;
}

button {
  margin-right: 10px;
  padding: 10px 15px;
}
</style>
</head>
<body>

<div class="field">
  <span class="label">Date of Birth (DD-MMM-YYYY)</span>
  <div id="dob" class="row"></div>
</div>

<div class="field">
  <span class="label">Postal Code (ANA NAN)</span>
  <div id="postal" class="row"></div>
</div>

<div class="field">
  <span class="label">RAMQ (AAAA NNNN NNNN)</span>
  <div id="ramq" class="row"></div>
</div>

<button id="submit">Submit</button>
<button id="clear">Clear</button>

<div id="report" style="margin-top:20px;font-weight:bold;"></div>

<script>
// ===== CORE BUILDER =====
function buildField(containerId, pattern, delimiters) {
  const container = document.getElementById(containerId);
  const inputs = [];

  pattern.forEach((type, i) => {
    const input = document.createElement("input");
    input.className = "box";
    input.maxLength = 1;
    input.inputMode = type === "N" ? "numeric" : "text";

    container.appendChild(input);
    inputs.push({ input, type });

    // auto advance
    input.addEventListener("input", () => {
      if (input.value.length > 0) {
        if (type === "N") {
          input.value = input.value.replace(/\D/g, "");
        } else {
          input.value = input.value.replace(/[^A-Za-z]/g, "").toUpperCase();
        }

        const idx = inputs.findIndex(b => b.input === input);
        if (idx < inputs.length - 1) {
          inputs[idx + 1].input.focus();
        }
      }
    });

    // backspace navigation
    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && input.value === "") {
        const idx = inputs.findIndex(b => b.input === input);
        if (idx > 0) inputs[idx - 1].input.focus();
      }
    });

    // delimiter
    if (delimiters[i]) {
      const d = document.createElement("span");
      d.className = "delim";
      d.textContent = delimiters[i];
      container.appendChild(d);
    }
  });

  function getValue() {
    return inputs.map(b => b.input.value).join("");
  }

  function validate() {
    let ok = true;
    inputs.forEach(b => {
      if (!b.input.value) {
        b.input.classList.add("invalid");
        ok = false;
      } else {
        b.input.classList.remove("invalid");
      }
    });
    return ok;
  }

  function clear() {
    inputs.forEach(b => b.input.value = "");
  }

  return { getValue, validate, clear };
}

// ===== BUILD FIELDS =====

// DOB: DD-MMM-YYYY
const dob = buildField(
  "dob",
  ['N','N','A','A','A','N','N','N','N'],
  [null, '-', null, null, '-', null, null, null, null]
);

// Postal: ANA NAN
const postal = buildField(
  "postal",
  ['A','N','A','N','A','N'],
  [null, null, ' ', null, null, null]
);

// RAMQ: AAAA NNNN NNNN
const ramq = buildField(
  "ramq",
  ['A','A','A','A','N','N','N','N','N','N','N','N'],
  [null,null,null,' ',null,null,null,' ',null,null,null,null]
);

// ===== BUTTONS =====
document.getElementById("submit").onclick = () => {
  const v1 = dob.validate();
  const v2 = postal.validate();
  const v3 = ramq.validate();

  document.getElementById("report").innerText =
    "DOB: " + dob.getValue() +
    "\nPostal: " + postal.getValue() +
    "\nRAMQ: " + ramq.getValue();

  if (v1 && v2 && v3) {
    dob.clear();
    postal.clear();
    ramq.clear();
  }
};

document.getElementById("clear").onclick = () => {
  dob.clear();
  postal.clear();
  ramq.clear();
  document.getElementById("report").innerText = "";
};
</script>

</body>
</html>
